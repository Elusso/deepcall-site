site_name: DeepCall Analytics
site_description: Интеллектуальный периметр вашего рекрутинга
site_url: https://DeepCallAnalytics.github.io/deepcall-site/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

nav:
  - Главная: index.md
  - Call-Tracking: call-tracking.md
  - Clawd-боты: clawd-bots.md
  - Статистика: statistics.md
  - Базы откликов: databases.md
  - Прайс-лист: pricing.md
  - Политика конфиденциальности: privacy.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables