<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в личный кабинет — DeepCall</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=11">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: 
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(0,180,216,0.07) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(6,182,212,0.05) 0%, transparent 50%),
                var(--bg);
        }
        
        .login-card {
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid rgba(0, 180, 216, 0.15);
            border-radius: var(--r-lg);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
        }
        
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            margin-bottom: var(--space-8);
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text);
        }
        
        .login-logo svg {
            width: 36px;
            height: 36px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        
        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: var(--space-3);
            color: var(--text);
        }
        
        .login-header p {
            color: var(--text-muted);
            font-size: var(--text-sm);
        }
        
        .form-group {
            margin-bottom: var(--space-6);
        }
        
        .form-group label {
            display: block;
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text);
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 180, 216, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: var(--text-base);
            transition: all var(--duration-normal) var(--ease-smooth);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 180, 216, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), #0891b2);
            color: #fff;
            border: none;
            border-radius: var(--r-sm);
            font-size: var(--text-base);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-spring);
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .login-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }
        
        .login-footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 16px;
            border-radius: var(--r-sm);
            margin-bottom: var(--space-6);
            font-size: var(--text-sm);
        }
        
        .big-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        
        .bo1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56,189,248,0.45) 0%, transparent 70%);
            top: -100px;
            right: -100px;
        }
        
        .bo2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(99,102,241,0.4) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
        }
        
        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="big-orb bo1"></div>
        <div class="big-orb bo2"></div>
        
        <div class="login-card">
            <div class="login-logo">
                <img src="assets/logo.svg" alt="DeepCall Logo" style="height: 40px; width: auto; vertical-align: middle; margin-right: 12px;">
                DeepCall
            </div>
            
            <div class="login-header">
                <h1>Вход в личный кабинет</h1>
                <p>Введите ваши учетные данные для доступа</p>
            </div>
            
            <div class="error-message" id="errorMessage">
                Неправильный логин или пароль. Пожалуйста, попробуйте еще раз.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Email или имя пользователя</label>
                    <input type="text" id="username" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login">Войти</button>
            </form>
            
            <div class="login-footer">
                <p>Забыли пароль? <a href="#">Восстановить</a></p>
                <p>Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Показываем сообщение об ошибке
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'block';
            
            // Скрываем сообщение через 5 секунд
            setTimeout(function() {
                errorMessage.style.display = 'none';
            }, 5000);
        });
    </script>
    <script src="js/responsive-logo.js"></script>
</body>
</html>
