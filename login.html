<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — DeepCall</title>
<meta name="description" content="Вход в личный кабинет DeepCall">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=13">
<style>
body { font-family:var(--font); background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.login-box { background:rgba(10,20,40,.6); border:1px solid rgba(56,189,248,.15); border-radius:20px; padding:48px; width:100%; max-width:420px; backdrop-filter:blur(20px); }
.login-logo { display:flex; align-items:center; gap:12px; font-weight:700; font-size:1.25rem; margin-bottom:32px; justify-content:center; }
.login-logo img { height:36px; width:auto; }
.login-title { font-size:1.5rem; font-weight:700; margin-bottom:8px; text-align:center; }
.login-sub { color:var(--text-muted); font-size:.875rem; margin-bottom:28px; text-align:center; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:.75rem; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
.form-group input { width:100%; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:14px 16px; color:var(--text); font-size:1rem; font-family:inherit; outline:none; transition:border-color .2s; }
.form-group input:focus { border-color:var(--accent); }
.btn-login { width:100%; background:var(--accent); color:#000; font-weight:600; padding:14px; border-radius:12px; border:none; cursor:pointer; font-size:1rem; transition:opacity .2s; }
.btn-login:hover { opacity:.9; }
.error-msg { color:#f87171; font-size:.875rem; margin-top:16px; text-align:center; min-height:1.5em; }
.links { display:flex; justify-content:space-between; margin-top:20px; font-size:.875rem; }
.links a { color:var(--text-muted); transition:color .2s; }
.links a:hover { color:var(--accent); }
.back { text-align:center; margin-top:32px; }
.back a { font-size:.875rem; color:var(--text-muted); }
.back a:hover { color:var(--accent); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo"><img src="assets/logo-kiton.png" alt="DeepCall">DeepCall</div>
  <div class="login-title">Вход в систему</div>
  <div class="login-sub">Для зарегистрированных клиентов</div>
  
  <form id="loginForm" onsubmit="return false;">
    <div class="form-group">
      <label>Логин / Email</label>
      <input type="text" id="login" placeholder="example@company.ru" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="off">
    </div>
    <button class="btn-login" id="btnLogin" type="button">Войти</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
  
  <div class="links">
    <a href="#" id="forgot">Забыли пароль?</a>
    <a href="contacts.html">Регистрация</a>
  </div>
  <div class="back"><a href="index.html">← На главную</a></div>
</div>

<script>
document.getElementById('btnLogin').addEventListener('click', function(){
  var login = document.getElementById('login').value.trim();
  var pass = document.getElementById('password').value.trim();
  var err = document.getElementById('errorMsg');
  err.textContent = 'Неверный логин или пароль. Пожалуйста, попробуйте ещё раз.';
  document.getElementById('password').value = '';
});
document.getElementById('forgot').addEventListener('click', function(e){
  e.preventDefault();
  document.getElementById('errorMsg').textContent = 'Функция восстановления пароля временно недоступна. Обратитесь в поддержку.';
});
document.getElementById('loginForm').addEventListener('submit', function(e){ e.preventDefault(); });
</script>
</body>
</html>
